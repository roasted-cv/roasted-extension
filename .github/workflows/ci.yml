name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build extractor (workspace dep)
        run: pnpm --filter @roasted/extractor build

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm --filter @roasted/extractor test

      - name: Build extension (Chrome)
        run: pnpm --filter extension build

      - name: Build extension (Firefox)
        run: pnpm --filter extension build:firefox
